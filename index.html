<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Isha Eras | EBM Debugger</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* CSSファイルが読み込めない場合のための最低限のバックアップ */
        body { background-color: #0A0E14; color: #E0E0E0; font-family: monospace; }
        .controls { display: flex; justify-content: center; gap: 2rem; padding: 2rem; }
        button { border: 1px solid #00F2FF; background: transparent; color: #00F2FF; padding: 1rem 2rem; cursor: pointer; }
        button:hover { background: #00F2FF; color: #0A0E14; }
    </style>
</head>
<body>

<header>
    <div class="logo">DR. ISHA ERAS // EBM_OS_v1.2</div>
    <div style="font-size: 0.7rem;">STATUS: <span style="color: #00F2FF; animation: blink 1.5s infinite;">CONNECTING...</span></div>
</header>

<div id="chat-container">
    <div class="message ai-message">
        左様でございますか。では、あなたの健康状態をデバッグするため、いくつかお聞きいたします。
        <br><br>
        <strong>第一の質問：</strong> 現在、日常生活に支障が出るほどの「痛み」や「違和感」を自覚されていますか？
    </div>
</div>

<div class="controls">
    <button id="btn-yes" onclick="handleAnswer('YES')">YES</button>
    <button id="btn-no" onclick="handleAnswer('NO')">NO</button>
</div>

<script src="script.js"></script>
<script type="module" src="script.js"></script>
    
<script>
    /* script.js が読み込めなかった場合、または HTML単体でテストする場合の
       簡易フォールバック（動作確認用）
    */
    if (typeof handleAnswer !== 'function') {
        window.handleAnswer = function(ans) {
            const chat = document.getElementById('chat-container');
            const userMsg = document.createElement('div');
            userMsg.className = 'message user-message';
            userMsg.style.alignSelf = 'flex-end';
            userMsg.style.color = '#00F2FF';
            userMsg.innerText = ans;
            chat.appendChild(userMsg);
            
            setTimeout(() => {
                const aiMsg = document.createElement('div');
                aiMsg.className = 'message ai-message';
                aiMsg.innerHTML = "解析中... script.js の接続を確認してください。ｗ";
                chat.appendChild(aiMsg);
                chat.scrollTop = chat.scrollHeight;
            }, 500);
        };
    }
</script>

</body>
</html>
