<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Isha Eras | EBM Debugger</title>
    <style>
        /* --- [CSS Patch: Cyber-Medical Theme] --- */
        :root {
            --bg-color: #0A0E14;
            --accent-cyan: #00F2FF;
            --accent-violet: #7000FF;
            --text-color: #E0E0E0;
            --glow: 0 0 15px rgba(0, 242, 255, 0.5);
            --font-main: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            padding: 1rem;
            border-bottom: 1px solid var(--accent-cyan);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 242, 255, 0.05);
            box-shadow: var(--glow);
            z-index: 10;
        }

        .logo {
            color: var(--accent-cyan);
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: var(--glow);
        }

        /* --- [Chat Layout] --- */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 80%;
            padding: 1.2rem;
            border-radius: 4px;
            line-height: 1.6;
            position: relative;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .ai-message {
            align-self: flex-start;
            border-left: 3px solid var(--accent-cyan);
            background: rgba(0, 242, 255, 0.03);
        }

        .user-message {
            align-self: flex-end;
            border-right: 3px solid var(--accent-violet);
            background: rgba(112, 0, 255, 0.08);
            color: var(--accent-cyan);
        }

        /* --- [Result Presentation] --- */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            border: 1px solid rgba(0, 242, 255, 0.2);
        }

        th {
            color: var(--accent-cyan);
            background: rgba(0, 242, 255, 0.1);
            text-align: left;
            padding: 0.6rem;
            border-bottom: 1px solid var(--accent-cyan);
        }

        td {
            padding: 0.6rem;
            border-bottom: 1px solid #1a1a1a;
        }

        .ebm-update {
            color: var(--accent-cyan);
            font-weight: bold;
            text-shadow: 0 0 5px rgba(0, 242, 255, 0.5);
        }

        .stamp {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-12deg);
            border: 4px double rgba(255, 0, 85, 0.4);
            color: rgba(255, 0, 85, 0.4);
            padding: 0.8rem;
            font-size: 2.5rem;
            font-weight: bold;
            pointer-events: none;
            display: none;
            z-index: 5;
            text-transform: uppercase;
        }

        /* --- [Controls] --- */
        .controls {
            padding: 2rem;
            display: flex;
            justify-content: center;
            gap: 2rem;
            background: linear-gradient(to top, var(--bg-color) 80%, transparent);
        }

        button {
            background: transparent;
            border: 1px solid var(--accent-cyan);
            color: var(--accent-cyan);
            padding: 0.8rem 2.5rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        button:hover {
            background: var(--accent-cyan);
            color: var(--bg-color);
            box-shadow: var(--glow);
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
